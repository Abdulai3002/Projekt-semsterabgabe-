<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>BMW 3er AUTOHAENDLER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BMW AutoHändler</h1>
        <p>Willkommen in Unserem Geschäft</p>
        <p>Hier finden Sie Ihr Traumauto</p>

	<form action="./cgi-bin/auto-suche.cgi" >
            <label>Generation</label>
            <select name="generation">
                <option value="">Alle</option>
                <option value="E30">E30 (1982-1994)</option>
                <option value="E36">E36 (1990-2000)</option>
                <option value="E46">E46 (1998-2006)</option>
            </select>

            <label>Maximalpreis €</label>
            <input type="number" name="preis" placeholder="10000">

            <label>Leistung (PS):</label>
            <select name="leistung">
                <option value="">Alle</option>
                <option value="bis100">bis 100 PS</option>
                <option value="100-150">100-150 PS</option>
                <option value="150-200">150-200 PS</option>
                <option value="200plus">über 200 PS</option>
            </select>

            <button type="submit">Suchen</button>
        </form>

        <footer>
            <a href="https://github.com/Abdulai3002/Projekt-semsterabgabe-">GitHub Repository</a>
        </footer>
    </div>
</body>
</html>
